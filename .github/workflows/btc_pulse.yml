name: BTC Pulse Monitor (相場フェーズ + トレンド転換 + 急変)

on:
  schedule:
    # 15分ごと(*/15)
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BTC pulse monitor
        env:
          DISCORD_WEBHOOK_TREND: ${{ secrets.DISCORD_WEBHOOK_TREND }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
          # 任意: シンボル上書き (デフォルト: BTCUSDT_PERP.A = Binance USDT-Perp)
          COINALYZE_BTC_SYMBOL: ${{ vars.COINALYZE_BTC_SYMBOL || 'BTCUSDT_PERP.A' }}
          TEST_DISCORD_TREND: ${{ vars.TEST_DISCORD_TREND || '' }}
        run: |
          python btc_pulse.py

      - name: Commit btc_pulse state and phase log
        run: |
          # btc_phase_log.csv (改良1: フェーズ履歴) も追跡対象に追加。
          # phase log は btc_pulse.py 側で毎時1回のみ追記されるため、未生成の回もある。
          # 存在するファイルだけ stage し、staged 変更がある時だけ commit/push する
          # (phase_log 未生成でも pathspec エラー(exit 128)で落ちないようにする)。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc_pulse_state.json 2>/dev/null || true
          [ -f btc_phase_log.csv ] && git add btc_phase_log.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "update btc_pulse state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no changes to commit"
          fi
