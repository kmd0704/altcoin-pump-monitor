name: Altcoin Pump Monitor (7戦略統合版)
on:
  # 2026-07-03 定期実行を停止: 旧7戦略統合版は2026-05-17にretire済みの決定に対し
  # scheduleが残って稼働し続けていたため、記録済みの決定に合わせて停止。
  # (CoinGecko Demo APIの月間コール予算の節約にもなる)
  # 再開する場合は下記scheduleブロックのコメントを外す。
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:  # 手動実行のみ可能

permissions:
  contents: write  # state.json をコミット保存するため

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CG_PLAN: ${{ vars.CG_PLAN || 'demo' }}
          ACCOUNT_BALANCE: ${{ vars.ACCOUNT_BALANCE || '100000' }}
          POSITION_PCT: ${{ vars.POSITION_PCT || '0.20' }}
          TEST_DISCORD: ${{ vars.TEST_DISCORD || '' }}
        run: |
          python monitor.py

      - name: Commit state.json
        run: |
          if [[ -n $(git status --porcelain state.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state $(date -u +%Y-%m-%dT%H:%MZ)" || true
            git push || true
          fi
