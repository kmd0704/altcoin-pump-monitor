name: Altcoin Pump Monitor v3.6

on:
  schedule:
    # 1時間ごとに実行(毎時0分)
    - cron: '0 * * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # state.json をコミット保存するため

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CG_PLAN: ${{ vars.CG_PLAN || 'demo' }}
          ACCOUNT_BALANCE: ${{ vars.ACCOUNT_BALANCE || '100000' }}
          POSITION_PCT: ${{ vars.POSITION_PCT || '0.20' }}
          TEST_DISCORD: ${{ vars.TEST_DISCORD || '' }}
        run: |
          python monitor.py

      - name: Commit state.json
        run: |
          if [[ -n $(git status --porcelain state.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state $(date -u +%Y-%m-%dT%H:%MZ)" || true
            git push || true
          fi
