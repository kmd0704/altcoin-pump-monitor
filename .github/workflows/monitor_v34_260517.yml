name: Altcoin Pump Monitor v3.4-260517 (案D 専用)

on:
  schedule:
    # 1時間ごとに実行(毎時5分 — 既存BOTの5分後にずらしてレート競合を回避)
    - cron: '5 * * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # state ファイルを自動コミット保存するため

jobs:
  monitor_v34_260517:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run v3.4-260517 monitor
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          DISCORD_WEBHOOK_V34_260517: ${{ secrets.DISCORD_WEBHOOK_V34_260517 }}
          CG_PLAN: ${{ vars.CG_PLAN || 'demo' }}
          ACCOUNT_BALANCE: ${{ vars.ACCOUNT_BALANCE || '100000' }}
          POSITION_PCT: ${{ vars.POSITION_PCT || '0.20' }}
          TEST_DISCORD_V34_260517: ${{ vars.TEST_DISCORD_V34_260517 || '' }}
        run: |
          python monitor_v34_260517.py

      - name: Commit state file
        run: |
          if [[ -n $(git status --porcelain monitor_v34_260517_state.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add monitor_v34_260517_state.json
            git commit -m "update v34-260517 state $(date -u +%Y-%m-%dT%H:%MZ)" || true
            git push || true
          fi
